<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnakeV1</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07080f;
      --surface:   #0d0e1a;
      --card:      #12141f;
      --border:    #1e2035;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #39ff9a;
      --green-dim: #1aff7a;
      --red:       #ff3d6b;
      --head:      #b5f5d0;
      --text:      #dde4f0;
      --muted:     #4a5272;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Orbitron', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated scanlines overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Subtle radial glow in background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(108,99,255,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 100%, rgba(57,255,154,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(255,61,107,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 24px 20px 20px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo {
      font-family: var(--display);
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .logo .v1 {
      color: var(--green);
      text-shadow: 0 0 12px rgba(57,255,154,0.7), 0 0 30px rgba(57,255,154,0.3);
    }

    .logo-line {
      display: block;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--green), var(--accent), transparent);
      margin-top: 6px;
      opacity: 0.6;
    }

    .tagline {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── Score Row ───────────────────────────────────────── */
    .score-row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .score-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 18px;
      text-align: center;
      min-width: 80px;
      position: relative;
      overflow: hidden;
    }

    .score-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
      opacity: 0.4;
    }

    .score-label {
      display: block;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .score-value {
      font-family: var(--display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .score-value.green  { color: var(--green); text-shadow: 0 0 10px rgba(57,255,154,0.5); }
    .score-value.purple { color: var(--accent2); }

    /* ── Canvas Wrap ─────────────────────────────────────── */
    .canvas-wrap {
      position: relative;
      border-radius: 14px;
      padding: 2px;
      background: linear-gradient(
        135deg,
        rgba(108,99,255,0.7) 0%,
        rgba(57,255,154,0.4) 40%,
        rgba(255,61,107,0.3) 70%,
        rgba(108,99,255,0.7) 100%
      );
      box-shadow:
        0 0 30px rgba(108,99,255,0.35),
        0 0 80px rgba(108,99,255,0.12),
        0 0 6px  rgba(57,255,154,0.2);
      animation: borderPulse 4s ease-in-out infinite;
    }

    @keyframes borderPulse {
      0%,100% { box-shadow: 0 0 30px rgba(108,99,255,0.35), 0 0 80px rgba(108,99,255,0.12); }
      50%      { box-shadow: 0 0 40px rgba(108,99,255,0.5),  0 0 90px rgba(108,99,255,0.2),  0 0 10px rgba(57,255,154,0.3); }
    }

    #gameCanvas {
      display: block;
      border-radius: 12px;
      background: var(--surface);
    }

    /* ── Overlay ─────────────────────────────────────────── */
    .overlay {
      position: absolute;
      inset: 2px;
      border-radius: 12px;
      background: rgba(7, 8, 15, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(6px);
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .overlay-title {
      font-family: var(--display);
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .overlay-title.red   { color: var(--red);  text-shadow: 0 0 20px rgba(255,61,107,0.7); }
    .overlay-title.green { color: var(--green); text-shadow: 0 0 20px rgba(57,255,154,0.7); }

    .overlay-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.7;
    }
    .overlay-sub b { color: var(--text); font-weight: normal; }

    .overlay-score {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .overlay-score span { color: var(--text); font-family: var(--display); font-size: 15px; }

    .play-btn {
      background: transparent;
      border: 1px solid var(--accent2);
      border-radius: 8px;
      color: var(--accent2);
      font-family: var(--display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 10px 30px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .play-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent2);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .play-btn:hover {
      color: #fff;
      box-shadow: 0 0 20px rgba(167,139,250,0.5);
      transform: translateY(-1px);
    }
    .play-btn:hover::before { opacity: 0.15; }
    .play-btn:active { transform: scale(0.97); }

    /* ── Pause badge ─────────────────────────────────────── */
    .pause-badge {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(7,8,15,0.85);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 9px;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pause-badge.show { opacity: 1; }

    /* ── Controls ────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .ctrl {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .ctrl b { color: var(--text); font-weight: normal; }

    /* ── Level flash ─────────────────────────────────────── */
    @keyframes lvlFlash {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.3); color: var(--green); text-shadow: 0 0 16px var(--green); }
      100% { transform: scale(1); }
    }
    .lvl-flash { animation: lvlFlash 0.5s ease; }
  </style>
</head>
<body>
<div id="root">

  <!-- Header -->
  <div class="header">
    <div class="logo">Snake<span class="v1">V1</span></div>
    <span class="logo-line"></span>
    <div class="tagline">Use arrow keys to move</div>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="score-box">
      <span class="score-label">Score</span>
      <div class="score-value" id="score-el">0</div>
    </div>
    <div class="score-box">
      <span class="score-label">Best</span>
      <div class="score-value purple" id="hi-el">0</div>
    </div>
    <div class="score-box">
      <span class="score-label">Level</span>
      <div class="score-value green" id="lvl-el">1</div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="360" height="360"></canvas>
    <span class="pause-badge" id="pause-badge">PAUSED</span>

    <!-- Overlay (start / game-over) -->
    <div class="overlay" id="overlay">
      <div class="overlay-title green" id="ov-title">SNAKE V1</div>
      <div class="overlay-sub" id="ov-sub">
        Press <b>Arrow Keys</b> or tap<br>the button below to start
      </div>
      <div class="overlay-score hidden" id="ov-score">Score: <span id="ov-score-val">0</span></div>
      <button class="play-btn" id="play-btn">START GAME</button>
    </div>
  </div>

  <!-- Controls hint -->
  <div class="controls">
    <div class="ctrl"><b>↑ ↓ ← →</b> Move</div>
    <div class="ctrl"><b>P</b> Pause</div>
    <div class="ctrl"><b>R</b> Restart</div>
  </div>
</div>

<script>
  const canvas  = document.getElementById('gameCanvas');
  const ctx     = canvas.getContext('2d');
  const CELL    = 18;
  const COLS    = canvas.width  / CELL;
  const ROWS    = canvas.height / CELL;
  const BASE_MS = 140;

  /* ── State ──────────────────────────────────────── */
  let snake, dir, nextDir, food;
  let score, hiScore = 0, level, speed;
  let running = false, paused = false, dead = false;
  let raf, lastTs = null, acc = 0;

  /* ── Init ───────────────────────────────────────── */
  function init() {
    snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10},{x:7,y:10}];
    dir     = {x:1, y:0};
    nextDir = {x:1, y:0};
    score   = 0;
    level   = 1;
    speed   = BASE_MS;
    dead    = false;
    paused  = false;
    placeFood();
    updateHUD();
    hideOverlay();
    document.getElementById('pause-badge').classList.remove('show');
    running  = true;
    lastTs   = null;
    acc      = 0;
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function placeFood() {
    let p;
    do { p = {x: rnd(COLS), y: rnd(ROWS)}; }
    while (snake.some(s => s.x===p.x && s.y===p.y));
    food = p;
  }

  function rnd(n) { return Math.floor(Math.random() * n); }

  /* ── Game loop ──────────────────────────────────── */
  function loop(ts) {
    if (!running) return;
    if (lastTs === null) lastTs = ts;
    if (!paused) acc += ts - lastTs;
    lastTs = ts;
    if (acc >= speed) { acc = 0; step(); }
    draw();
    raf = requestAnimationFrame(loop);
  }

  function step() {
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return die();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return die();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      if (score > hiScore) hiScore = score;

      const newLevel = Math.floor(score / 100) + 1;
      if (newLevel > level) {
        level = newLevel;
        speed = Math.max(50, BASE_MS - (level - 1) * 10);
        flashLevel();
      }

      placeFood();
      updateHUD();
    } else {
      snake.pop();
    }
  }

  function die() {
    running = false;
    dead    = true;
    showOverlay('GAME OVER', 'red', score);
  }

  function flashLevel() {
    const el = document.getElementById('lvl-el');
    el.classList.remove('lvl-flash');
    void el.offsetWidth; // reflow
    el.classList.add('lvl-flash');
    el.addEventListener('animationend', () => el.classList.remove('lvl-flash'), {once:true});
  }

  /* ── Drawing ────────────────────────────────────── */
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawFood();
    drawSnake();
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(30,32,53,0.6)';
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(canvas.width, y*CELL); ctx.stroke();
    }
  }

  function drawFood() {
    const fx = food.x * CELL + CELL/2;
    const fy = food.y * CELL + CELL/2;
    const r  = CELL/2 - 2;

    ctx.save();
    ctx.shadowColor = '#ff3d6b';
    ctx.shadowBlur  = 16;
    ctx.fillStyle   = '#ff3d6b';
    ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(fx-2, fy-2, r*0.3, 0, Math.PI*2); ctx.fill();
  }

  function drawSnake() {
    const len = snake.length;
    snake.forEach((seg, i) => {
      const x = seg.x * CELL, y = seg.y * CELL;
      const pad = 1.5;
      const rx = x+pad, ry = y+pad, rw = CELL-pad*2, rh = CELL-pad*2;

      ctx.save();
      if (i === 0) {
        ctx.shadowColor = '#39ff9a';
        ctx.shadowBlur  = 16;
        ctx.fillStyle   = '#b5f5d0';
      } else {
        const t   = i / len;
        const g   = Math.round(255 - 55*t);
        const b   = Math.round(154 - 60*t);
        ctx.shadowColor = `rgb(57,${g},${b})`;
        ctx.shadowBlur  = 7;
        ctx.fillStyle   = `rgb(57,${g},${b})`;
      }

      roundRect(rx, ry, rw, rh, 4);
      ctx.fill();
      ctx.restore();

      // eyes on head
      if (i === 0) {
        const cx = rx + rw/2, cy = ry + rh/2;
        const eo = 3.5;
        const e1x = cx + dir.y*eo - dir.x*eo*0.3;
        const e1y = cy - dir.x*eo - dir.y*eo*0.3;
        const e2x = cx - dir.y*eo - dir.x*eo*0.3;
        const e2y = cy + dir.x*eo - dir.y*eo*0.3;
        ctx.fillStyle = '#07080f';
        ctx.beginPath(); ctx.arc(e1x, e1y, 1.6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, 1.6, 0, Math.PI*2); ctx.fill();
      }
    });
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  /* ── HUD ────────────────────────────────────────── */
  function updateHUD() {
    document.getElementById('score-el').textContent = score;
    document.getElementById('hi-el').textContent    = hiScore;
    document.getElementById('lvl-el').textContent   = level;
  }

  /* ── Overlay ────────────────────────────────────── */
  function showOverlay(title, color, sc) {
    const el      = document.getElementById('overlay');
    const titleEl = document.getElementById('ov-title');
    const subEl   = document.getElementById('ov-sub');
    const scoreEl = document.getElementById('ov-score');
    const btn     = document.getElementById('play-btn');

    titleEl.textContent = title;
    titleEl.className   = 'overlay-title ' + color;

    if (sc !== undefined) {
      subEl.classList.add('hidden');
      scoreEl.classList.remove('hidden');
      document.getElementById('ov-score-val').textContent = sc;
      btn.textContent = 'PLAY AGAIN';
    } else {
      subEl.classList.remove('hidden');
      scoreEl.classList.add('hidden');
      btn.textContent = 'START GAME';
    }

    el.classList.remove('hidden');
  }

  function hideOverlay() {
    document.getElementById('overlay').classList.add('hidden');
  }

  /* ── Input ──────────────────────────────────────── */
  const DIRS = {
    ArrowUp:    {x:0,  y:-1},
    ArrowDown:  {x:0,  y:1},
    ArrowLeft:  {x:-1, y:0},
    ArrowRight: {x:1,  y:0},
  };

  document.addEventListener('keydown', e => {
    if (DIRS[e.key]) {
      e.preventDefault();
      const nd = DIRS[e.key];
      if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
      if (!running && !paused) { init(); return; }
    }
    if (e.key === 'p' || e.key === 'P') {
      if (running || paused) {
        paused = !paused;
        document.getElementById('pause-badge').classList.toggle('show', paused);
      }
    }
    if (e.key === 'r' || e.key === 'R') init();
  });

  document.getElementById('play-btn').addEventListener('click', init);

  /* ── Helpers ────────────────────────────────────── */
  Object.assign(HTMLElement.prototype, {
    get hidden() { return this.classList.contains('hidden'); },
  });
  Element.prototype.classList.add; // just to ensure it's loaded

  // Show start screen
  showOverlay('SNAKE V1', 'green');
</script>
</body>
</html>
